name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm i --include=optional

      - name: Build Angular app
        run: npm run build

      - name: Check build output
        run: ls -R dist/

      - name: Add CNAME
        run: |
          # Перевіряємо обидва можливі шляхи (з /browser і без)
          if [ -d "dist/sport-family-site/browser" ]; then
            echo "sport-family.itkamianets.com" > dist/sport-family-site/browser/CNAME
          else
            echo "sport-family.itkamianets.com" > dist/sport-family-site/CNAME
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # Визначаємо папку автоматично
          folder: ${{ hashFiles('dist/sport-family-site/browser/index.html') != '' && 'dist/sport-family-site/browser' || 'dist/sport-family-site' }}
          branch: gh-pages
          clean: true
